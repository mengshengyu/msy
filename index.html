  <body>
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
      <defs>
        <filter id="liquid-glass" x="-20%" y="-50%" width="140%" height="200%" color-interpolation-filters="sRGB">
          <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur1" />
          <feColorMatrix in="blur1" type="saturate" values="2.2" result="sat" />
          <feComponentTransfer in="sat" result="bright">
            <feFuncR type="linear" slope="1.15" intercept="0.02" />
            <feFuncG type="linear" slope="1.15" intercept="0.02" />
            <feFuncB type="linear" slope="1.15" intercept="0.02" />
          </feComponentTransfer>
          <feComposite in="bright" in2="SourceAlpha" operator="in" result="cropped" />
        </filter>
      </defs>
    </svg>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
